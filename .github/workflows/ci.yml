name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first: @mo/server and @mo/ui typecheck against the compiled dist of
      # @mo/shared and @mo/tracing, so the libs must exist before typecheck runs.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright browser
        run: pnpm --filter @mo/e2e exec playwright install --with-deps chromium

      - name: E2E (hermetic — boots app + mock Anthropic, no external services)
        run: pnpm --filter @mo/e2e test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
          if-no-files-found: ignore
