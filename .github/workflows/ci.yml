name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sqlite-server/go.sum

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (UI + tracing + Go server)
        run: pnpm build

      - name: Typecheck (UI + tracing)
        run: pnpm typecheck

      - name: go vet
        run: cd sqlite-server && CGO_ENABLED=0 go vet ./...

      - name: Install Playwright browser
        run: pnpm --filter @mo/e2e exec playwright install --with-deps chromium

      # Hermetic: Playwright boots the Go/SQLite server (local frozen tier) + a mock Anthropic,
      # then runs smoke + agent + cold-tier specs. No external services.
      - name: E2E
        run: pnpm --filter @mo/e2e test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
          if-no-files-found: ignore
